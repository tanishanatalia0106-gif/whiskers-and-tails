<!DOCTYPE html>
<html>
<head>
<title>Reviews</title>
<link rel="stylesheet" href="style.css">

<style>
.review-box {
    background: white;
    padding: 15px;
    margin: 15px auto;
    border-radius: 12px;
    width: 60%;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.stars span {
    font-size: 22px;
    cursor: pointer;
}

.selected-star {
    color: gold;
}
</style>

</head>
<body>

<header>
<div class="logo">🐾 Whiskers and Tails</div>
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="cats.html">Our Cats</a>
<a href="menu.html">Menu</a>
<a href="themes.html">Themes</a>
<a href="events.html">Events</a>
<a href="allergies.html">Allergies</a>
<a href="visit.html">Visit Us</a>
<a href="booking.html">Book Tickets</a>
<a href="reviews.html">Reviews</a>
</nav>
</header>

<section class="section">
<h2>Customer Reviews ⭐</h2>

<input type="text" id="reviewInput" placeholder="Write your review...">

<!-- STAR RATING -->
<div class="stars" id="starContainer">
    <span onclick="setRating(1)">★</span>
    <span onclick="setRating(2)">★</span>
    <span onclick="setRating(3)">★</span>
    <span onclick="setRating(4)">★</span>
    <span onclick="setRating(5)">★</span>
</div>

<button onclick="addReview()">Submit Review</button>

<div id="reviewList"></div>
</section>

<script>
let reviews = JSON.parse(localStorage.getItem("reviews")) || [];
let rating = 0;

function setRating(num) {
    rating = num;
    const stars = document.querySelectorAll("#starContainer span");

    stars.forEach((s, i) => {
        s.classList.toggle("selected-star", i < num);
    });
}

function addReview() {
    const text = document.getElementById("reviewInput").value;

    if (text.trim() === "" || rating === 0) {
        alert("Add review and rating!");
        return;
    }

    reviews.push({ text, rating });
    localStorage.setItem("reviews", JSON.stringify(reviews));

    document.getElementById("reviewInput").value = "";
    rating = 0;
    displayReviews();
}

// delete
function deleteReview(i) {
    reviews.splice(i, 1);
    localStorage.setItem("reviews", JSON.stringify(reviews));
    displayReviews();
}

function displayReviews() {
    const list = document.getElementById("reviewList");
    list.innerHTML = "";

    reviews.forEach((r, i) => {
        list.innerHTML += `
            <div class="review-box">
                <div>${"⭐".repeat(r.rating)}</div>
                <p>${r.text}</p>
                <button onclick="deleteReview(${i})">Delete</button>
            </div>
        `;
    });
}

displayReviews();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Tickets | Whiskers and Tails</title>
<link rel="stylesheet" href="style.css">

<style>
#seats {
    display: grid;
    grid-template-columns: repeat(5, 60px);
    gap: 10px;
    justify-content: center;
    margin: 20px 0;
}

.seat {
    padding: 10px;
    background: #eee;
    border-radius: 8px;
    cursor: pointer;
}

.seat.selected {
    background: #ffb347;
    color: white;
}

.seat.booked {
    background: #999;
    cursor: not-allowed;
}
.payment-box {
    background: white;
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
}
</style>

</head>
<body>

<header>
<div class="logo">🐾 Whiskers and Tails</div>
<nav>
<a href="index.html">Home</a>
<a href="cats.html">Our Cats</a>
<a href="menu.html">Menu</a>
<a href="allergies.html">Allergies</a>
</nav>
</header>

<section class="section">
<h2>Book Your Visit</h2>

<form onsubmit="confirmBooking(event)">

<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Email Address" required>

<label>Select Date</label>
<input type="date" required>

<label>Select Time Slot</label>
<select id="timeSlot" required>
<option>10 AM - 11 AM</option>
<option>11 AM - 12 PM</option>
<option>12 PM - 1 PM</option>
<option>4 PM - 5 PM</option>
<option>6 PM - 7 PM</option>
</select>

<input type="number" id="people" placeholder="Number of People" min="1" required oninput="calculateTotal()">

<p id="totalAmount"><strong>Total Amount: ₹0</strong></p>

<!-- SEATS -->
<h3>Select Your Seat</h3>
<div id="seats"></div>

<!-- CAT -->
<h3>Select Your Cat</h3>
<select id="catSelect"></select>

<!-- PAYMENT -->
<div class="payment-box">
<h3>Payment Details</h3>
<input type="text" placeholder="Card Number" maxlength="16" required>
<input type="text" placeholder="Card Holder Name" required>
<input type="text" placeholder="MM/YY" required>
<input type="password" placeholder="CVV" maxlength="3" required>
</div>

<button type="submit">Confirm Booking</button>

</form>
</section>

<script>
const ticketPrice = 500;

let selectedSeat = null;

let bookedSeats = JSON.parse(localStorage.getItem("bookedSeats")) || {};
let bookedCats = JSON.parse(localStorage.getItem("bookedCats")) || {};

function calculateTotal() {
    const people = document.getElementById("people").value;
    document.getElementById("totalAmount").innerText =
        "Total Amount: ₹" + (people * ticketPrice || 0);
}

const seatsDiv = document.getElementById("seats");

for (let i = 1; i <= 15; i++) {
    const seat = document.createElement("div");
    seat.classList.add("seat");
    seat.innerText = i;

    if (bookedSeats[i]) {
        seat.classList.add("booked");
    }

    seat.onclick = () => {
        if (seat.classList.contains("booked")) return;

        document.querySelectorAll(".seat").forEach(s => s.classList.remove("selected"));
        seat.classList.add("selected");
        selectedSeat = i;
    };

    seatsDiv.appendChild(seat);
}

const cats = ["Milo", "Luna", "Oliver", "Bella", "Leo", "Nala"];
const catSelect = document.getElementById("catSelect");

cats.forEach(cat => {
    const option = document.createElement("option");

    if (bookedCats[cat]) {
        option.disabled = true;
        option.text = cat + " (Booked)";
    } else {
        option.text = cat;
    }

    catSelect.appendChild(option);
});

function confirmBooking(e) {
    e.preventDefault();

    const people = document.getElementById("people").value;
    const cat = catSelect.value;

    if (!selectedSeat) {
        alert("Please select a seat!");
        return;
    }

    if (bookedCats[cat]) {
        alert("This cat is already booked!");
        return;
    }

    bookedSeats[selectedSeat] = true;
    bookedCats[cat] = true;
    localStorage.setItem("bookedSeats", JSON.stringify(bookedSeats));
    localStorage.setItem("bookedCats", JSON.stringify(bookedCats));
    const total = people * ticketPrice;
    document.body.innerHTML = `
        <div style="text-align:center; padding:60px;">
            <h1>🎉 Booking Confirmed!</h1>
            <p><strong>Seat:</strong> ${selectedSeat}</p>
            <p><strong>Cat:</strong> ${cat}</p>
            <p><strong>Total Paid:</strong> ₹${total}</p>
            <p>⏰ Your session is booked successfully.</p>
            <p>🐾 See you at Whiskers and Tails!</p>
            <button onclick="location.href='index.html'">Go Home</button>
        </div>
    `;
}
</script>

</body>
</html>
